spring.application.name=java-builder

# Cấu hình kết nối MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/ecomerce_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=123456
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Cấu hình JPA / Hibernate
# Tự động tạo/cập nhật bảng dựa trên Entity (tắt khi lên Production)
spring.jpa.hibernate.ddl-auto=update
# Hiển thị câu lệnh SQL ra console để tiện debug
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true